name: CI Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Build, scan, push
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install & lint Chat Front
        run: |
          cd microservices-chat/chat_front
          pip install -r requirements.txt
          python -m py_compile manage.py && echo "Syntax OK"

      - name: Install & lint Chat Service
        run: |
          cd microservices-chat/chat_svc
          pip install -r requirements.txt
          python -m py_compile manage.py && echo "Syntax OK"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image (chat-front local)
        uses: docker/build-push-action@v5
        with:
          context: ./microservices-chat/chat_front
          push: false
          load: true
          tags: ${{ env.ECR_REGISTRY }}/chat-front:${{ env.IMAGE_TAG }}

      - name: Trivy scan chat-front
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/chat-front:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-front.sarif
          severity: CRITICAL,HIGH

      - name: Build image (chat-svc local)
        uses: docker/build-push-action@v5
        with:
          context: ./microservices-chat/chat_svc
          push: false
          load: true
          tags: ${{ env.ECR_REGISTRY }}/chat-svc:${{ env.IMAGE_TAG }}

      - name: Trivy scan chat-svc
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/chat-svc:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-svc.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy Results (chat-front)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-front.sarif
          category: trivy-chat-front

      - name: Upload Trivy Results (chat-svc)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-svc.sarif
          category: trivy-chat-svc

      - name: Push Chat Front to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./microservices-chat/chat_front
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/chat-front:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/chat-front:latest
          cache-from: type=gha

      - name: Push Chat Service to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./microservices-chat/chat_svc
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/chat-svc:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/chat-svc:latest
          cache-from: type=gha

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to staging (automatic)
  # ────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging        # maps to a GitHub Environment

    steps:
      - name: Install tooling
        run: |
          curl -sLo /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update staging overlay
        env:
          GIT_SSH_KEY: ${{ secrets.MANIFEST_REPO_DEPLOY_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          echo "$GIT_SSH_KEY" | ssh-add -
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git clone git@github.com:TripleAze/k8-manifests.git manifests
          cd manifests/overlays/staging

          # Kustomize-native image tag updates
          kustomize edit set image \
            chat-front=${{ env.ECR_REGISTRY }}/chat-front:${{ env.IMAGE_TAG }}
          kustomize edit set image \
            chat-svc=${{ env.ECR_REGISTRY }}/chat-svc:${{ env.IMAGE_TAG }}

          # yq for any non-image fields (e.g. env vars, annotations)
          yq e -i \
            '.spec.template.metadata.annotations["deploy-time"] = "${{ github.run_id }}"' \
            ../../base/chat-front-deployment.yaml
          yq e -i \
            '.spec.template.metadata.annotations["deploy-time"] = "${{ github.run_id }}"' \
            ../../base/chat-svc-deployment.yaml

          git config user.email "aliyuatikuabubakar7@gmail.com"
          git config user.name  "CI Bot"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "ci(staging): deploy ${{ env.IMAGE_TAG }}

          Repo: ${{ github.repository }}
          Run:  ${{ github.run_id }}"
          git push

      - name: Wait for ArgoCD staging sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          # Poll ArgoCD API until app is Synced+Healthy or timeout
          for i in $(seq 1 20); do
            STATUS=$(curl -sf -H "Authorization: Bearer $ARGOCD_TOKEN" \
              "https://$ARGOCD_SERVER/api/v1/applications/my-app-staging" \
              | jq -r '.status.sync.status + "/" + .status.health.status')
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "Synced/Healthy" ] && exit 0
            sleep 15
          done
          echo "Staging sync timed out" && exit 1

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Manual approval gate
  # ────────────────────────────────────────────────────────────────
  approve-production:
    name: Approve → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production     # GitHub Environment with required reviewers
                                # — pipeline pauses here until a human approves

    steps:
      - name: Approval gate
        run: |
          echo "Approved by: ${{ github.actor }}"
          echo "Promoting staging → production for tag: ${{ env.IMAGE_TAG }}"

  # ────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy to production (post-approval)
  # ────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: approve-production

    steps:
      - name: Install tooling
        run: |
          curl -sLo /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update production overlay
        env:
          GIT_SSH_KEY: ${{ secrets.MANIFEST_REPO_DEPLOY_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          echo "$GIT_SSH_KEY" | ssh-add -
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git clone git@github.com:TripleAze/k8-manifests.git manifests
          cd manifests/overlays/production

          kustomize edit set image \
            chat-front=${{ env.ECR_REGISTRY }}/chat-front:${{ env.IMAGE_TAG }}
          kustomize edit set image \
            chat-svc=${{ env.ECR_REGISTRY }}/chat-svc:${{ env.IMAGE_TAG }}

          git config user.email "aliyuatikuabubakar7@gmail.com"
          git config user.name  "CI Bot"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "ci(production): promote ${{ env.IMAGE_TAG }}

          Approved by: ${{ github.actor }}
          Repo:        ${{ github.repository }}
          Run:         ${{ github.run_id }}"
          git push

      - name: Wait for ArgoCD production sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -H "Authorization: Bearer $ARGOCD_TOKEN" \
              "https://$ARGOCD_SERVER/api/v1/applications/my-app-production" \
              | jq -r '.status.sync.status + "/" + .status.health.status')
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "Synced/Healthy" ] && exit 0
            sleep 15
          done
          echo "Production sync timed out oh" && exit 1