name: CI Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: my-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Build, scan, push
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & build
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: npm test -- --coverage

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to staging (automatic)
  # ────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging        # maps to a GitHub Environment

    steps:
      - name: Install tooling
        run: |
          curl -sLo /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update staging overlay
        env:
          GIT_SSH_KEY: ${{ secrets.MANIFEST_REPO_DEPLOY_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          echo "$GIT_SSH_KEY" | ssh-add -
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git clone git@github.com:your-org/k8s-manifests.git manifests # Rember to update this
          cd manifests/overlays/staging

          # Kustomize-native image tag update
          kustomize edit set image \
            my-app=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

          # yq for any non-image fields (e.g. env vars, annotations)
          yq e -i \
            '.spec.template.metadata.annotations["deploy-time"] = "${{ github.run_id }}"' \
            ../../base/deployment.yaml

          git config user.email "ci-bot@your-org.com"
          git config user.name  "CI Bot"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "ci(staging): deploy ${{ env.IMAGE_TAG }}

          Repo: ${{ github.repository }}
          Run:  ${{ github.run_id }}"
          git push

      - name: Wait for ArgoCD staging sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          # Poll ArgoCD API until app is Synced+Healthy or timeout
          for i in $(seq 1 20); do
            STATUS=$(curl -sf -H "Authorization: Bearer $ARGOCD_TOKEN" \
              "https://$ARGOCD_SERVER/api/v1/applications/my-app-staging" \
              | jq -r '.status.sync.status + "/" + .status.health.status')
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "Synced/Healthy" ] && exit 0
            sleep 15
          done
          echo "Staging sync timed out" && exit 1

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Manual approval gate
  # ────────────────────────────────────────────────────────────────
  approve-production:
    name: Approve → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production     # GitHub Environment with required reviewers
                                # — pipeline pauses here until a human approves

    steps:
      - name: Approval gate
        run: |
          echo "Approved by: ${{ github.actor }}"
          echo "Image:       ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "Promoting staging → production"

  # ────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy to production (post-approval)
  # ────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: approve-production

    steps:
      - name: Install tooling
        run: |
          curl -sLo /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update production overlay
        env:
          GIT_SSH_KEY: ${{ secrets.MANIFEST_REPO_DEPLOY_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          echo "$GIT_SSH_KEY" | ssh-add -
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git clone git@github.com:your-org/k8s-manifests.git manifests
          cd manifests/overlays/production

          kustomize edit set image \
            my-app=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

          git config user.email "ci-bot@your-org.com"
          git config user.name  "CI Bot"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "ci(production): promote ${{ env.IMAGE_TAG }}

          Approved by: ${{ github.actor }}
          Repo:        ${{ github.repository }}
          Run:         ${{ github.run_id }}"
          git push

      - name: Wait for ArgoCD production sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -H "Authorization: Bearer $ARGOCD_TOKEN" \
              "https://$ARGOCD_SERVER/api/v1/applications/my-app-production" \
              | jq -r '.status.sync.status + "/" + .status.health.status')
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "Synced/Healthy" ] && exit 0
            sleep 15
          done
          echo "Production sync timed out" && exit 1